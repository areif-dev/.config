[colors]
background = #1E1D2F
background-alt = #373B41
foreground = #C5C8C6
primary = #96CDFB
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/base]
radius = 8
height = 24pt
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

font-0 = Cascadia Code;2
font-1 = Font Awesome 6 Free Solid;2

separator = |
separator-foreground = ${colors.disabled}

cursor-click = pointer
cursor-scroll = ns-resize

[bar/workspace]
inherit = bar/base
width = 12%
modules-center = xworkspaces

[bar/date]
inherit = bar/base
width = 10%
offset-x = 44%
modules-center = date

[bar/info]
inherit = bar/base
width = 10%
offset-x = 90%

modules-center = pulseaudio memory cpu

[bar/example]
inherit = bar/base
width = 100%

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio memory cpu eth date

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = пғ—
label-active-foreground = #fab387
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = в—Ҹ
label-occupied-padding = 1

label-urgent = в—Ҹ
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = пҲӯ
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix-foreground = ${colors.primary}
format-volume = %{F#f38ba8}<ramp-volume>%{F#C5C8C6} <label-volume>
format-volume-foreground = #a6e3a1

label-volume = %percentage%%

label-muted = пҡ© muted
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = пҖҰ
ramp-volume-1 = пҖ§
ramp-volume-2 = рҹ”Ҡ

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "п”ё "
format-prefix-foreground = #f9e2af
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "пӢӣ "
format-prefix-foreground = #a6e3a1
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date-alt = %{F#cba6f7}пҖ— %{F#C5C8C6}%H:%M
date = %{F#cba6f7}пҖ— %{F#C5C8C6}%Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
