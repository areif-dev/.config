[colors]
background = #1E1D2F
background-alt = #373B41
foreground = #C5C8C6
primary = #96CDFB
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/base]
radius = 6
height = 24pt
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

font-0 = Cascadia Code;2
font-1 = Font Awesome 6 Free Solid;2

separator = |
separator-foreground = ${colors.disabled}

cursor-click = pointer
cursor-scroll = ns-resize

dpi = 192

[bar/workspace]
inherit = bar/base
width = 20%
modules-center = xworkspaces

[bar/date]
inherit = bar/base
width = 18%
offset-x = 40%
modules-center = date

[bar/info]
inherit = bar/base
width = 26%
offset-x = 74%

modules-center = pulseaudio memory cpu battery

[bar/example]
inherit = bar/base
width = 100%

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio memory cpu eth date

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/battery]
type = internal/battery

battery = BAT1
adapter = ADP1

poll-interval = 5

format-charging = %{F#94e2d5}<animation-charging> %{F#C5C8C6}<label-charging>
format-discharging = %{F#94e2d5}<ramp-capacity> %{F#C5C8C6}<label-discharging>
label-discharging = %percentage%%

label-low = %{F#FF0000}ÔČĄ %{F#C5C8C6}%percentage%%

animation-charging-0 = ÔČÉ
animation-charging-1 = ÔČā
animation-charging-2 = ÔČĀ
animation-charging-3 = ÔČÄ

ramp-capacity-0 = ÔČÉ
ramp-capacity-1 = ÔČā
ramp-capacity-2 = ÔČĀ
ramp-capacity-3 = ÔČÄ

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix-foreground = ${colors.primary}
format-volume = %{F#f38ba8}<ramp-volume>%{F#C5C8C6} <label-volume>
format-volume-foreground = #a6e3a1

label-volume = %percentage%%

label-muted = Ôö© muted
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ūüĒä

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÔĒł "
format-prefix-foreground = #f9e2af
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = #a6e3a1
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date-alt = %{F#cba6f7}ÔÄó %{F#C5C8C6}%H:%M
date = %{F#cba6f7}ÔÄó %{F#C5C8C6}%Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
